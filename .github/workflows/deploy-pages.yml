name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-production:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out latest release tag
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "$TAG" ]]; then
            echo "Building production from ${TAG}."
            git checkout "$TAG"
          else
            echo "No release tag found; building production from main."
            git checkout origin/main
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Check JS syntax
        run: npm run lint

      - name: Upload production artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: web
          retention-days: 1

  build-staging:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Check JS syntax
        run: npm run lint

      - name: Upload staging artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-build
          path: web
          retention-days: 1

  deploy:
    needs: [build-production, build-staging]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download production build
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: deploy-root

      - name: Download staging build
        uses: actions/download-artifact@v8
        with:
          name: staging-build
          path: deploy-root/staging

      - name: Inject staging banner
        run: |
          sed -i 's|<body>|<body><div style="background:#f59e0b;color:#000;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:9999;position:relative;">⚠ STAGING — This is a preview version. <a href="../" style="color:#000;text-decoration:underline;">Go to production</a></div>|' deploy-root/staging/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: deploy-root

      - id: deployment
        uses: actions/deploy-pages@v5
