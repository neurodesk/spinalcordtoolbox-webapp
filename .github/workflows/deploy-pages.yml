name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-production:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Check out latest release tag
        run: |
          git fetch --force --tags origin
          TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "$TAG" ]]; then
            echo "Building production from ${TAG}."
            git checkout "$TAG"
          else
            echo "No release tag found; building production from main."
            git checkout origin/main
          fi
          git lfs pull

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Verify deployed model assets
        run: |
          python3 - <<'PY'
          from pathlib import Path

          min_size_bytes = 100_000
          lfs_pointer_prefix = b"version https://git-lfs.github.com/spec/"

          asset_paths = list(Path("web/models").glob("*.onnx"))
          asset_paths += list(Path("web/models/templates").glob("**/*.nii.gz"))

          for path in sorted(asset_paths):
              data = path.read_bytes()
              if data.startswith(lfs_pointer_prefix):
                  raise SystemExit(f"{path} is a Git LFS pointer, not a deployed binary")
              if len(data) <= min_size_bytes:
                  raise SystemExit(f"{path} is unexpectedly small: {len(data)} bytes")
          PY

      - name: Upload production artifact
        uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: web
          retention-days: 1

  build-staging:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          lfs: true

      - name: Mark staging build version
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BASE_VERSION="$(bash scripts/get_version.sh)"
          STAGING_VERSION="${BASE_VERSION}-staging+${SHORT_SHA}"
          sed -i -E "s/^export const VERSION = '[^']+';$/export const VERSION = '${STAGING_VERSION}';/" web/js/app/config.js
          echo "Building staging as ${STAGING_VERSION}."

      - name: Download ONNX Runtime WASM files
        run: |
          cd web
          bash setup.sh

      - name: Verify deployed model assets
        run: |
          python3 - <<'PY'
          from pathlib import Path

          min_size_bytes = 100_000
          lfs_pointer_prefix = b"version https://git-lfs.github.com/spec/"

          asset_paths = list(Path("web/models").glob("*.onnx"))
          asset_paths += list(Path("web/models/templates").glob("**/*.nii.gz"))

          for path in sorted(asset_paths):
              data = path.read_bytes()
              if data.startswith(lfs_pointer_prefix):
                  raise SystemExit(f"{path} is a Git LFS pointer, not a deployed binary")
              if len(data) <= min_size_bytes:
                  raise SystemExit(f"{path} is unexpectedly small: {len(data)} bytes")
          PY

      - name: Upload staging artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-build
          path: web
          retention-days: 1

  deploy:
    needs: [build-production, build-staging]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download production build
        uses: actions/download-artifact@v8
        with:
          name: production-build
          path: deploy-root

      - name: Download staging build
        uses: actions/download-artifact@v8
        with:
          name: staging-build
          path: deploy-root/staging

      - name: Inject staging banner
        run: |
          sed -i 's|<body>|<body><div style="background:#f59e0b;color:#000;text-align:center;padding:6px;font-size:13px;font-weight:600;z-index:9999;position:relative;">⚠ STAGING — This is a preview version. <a href="../" style="color:#000;text-decoration:underline;">Go to production</a></div>|' deploy-root/staging/index.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: deploy-root

      - id: deployment
        uses: actions/deploy-pages@v5
